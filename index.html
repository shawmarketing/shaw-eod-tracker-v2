<!DOCTYPE html>
<html lang="en">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f6f9;color:#1a1a2e;font-size:15px;min-height:100vh}
.top-bar{background:#1a1a2e;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.top-bar h1{font-size:15px;font-weight:600}
.container{max-width:520px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.card-title{font-size:14px;font-weight:600;margin-bottom:14px;color:#1a1a2e;display:flex;align-items:center;gap:8px}
.icon{width:26px;height:26px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.icon-blue{background:#e8f0fe}.icon-green{background:#e6f4ea}.icon-orange{background:#fef3e2}.icon-purple{background:#f3e8fd}.icon-red{background:#fce8e6}
label{display:block;font-size:12px;font-weight:500;color:#666;margin-bottom:4px;margin-top:10px}
label:first-of-type{margin-top:0}
input,select,textarea{width:100%;padding:9px 11px;border:1.5px solid #e0e0e0;border-radius:9px;font-size:13px;font-family:inherit;background:#fafafa;color:#1a1a2e;transition:border .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:#4a6cf7;background:#fff}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
textarea{resize:vertical;min-height:60px}
.yn-group{display:flex;gap:8px;margin-top:2px}
.yn-btn{flex:1;padding:9px;border:1.5px solid #e0e0e0;border-radius:9px;background:#fafafa;font-size:12px;font-weight:500;cursor:pointer;text-align:center;transition:all .2s;color:#666}
.yn-btn.yes.active{background:#e6f4ea;border-color:#34a853;color:#1e7e34}
.yn-btn.no.active{background:#fce8e6;border-color:#ea4335;color:#c62828}
.yn-btn.locked{opacity:.4;cursor:not-allowed;pointer-events:none}
.yn-btn:hover:not(.active):not(.locked){background:#f0f0f0}
.project-block{background:#f8f9ff;border:1.5px solid #e8f0fe;border-radius:10px;padding:12px;margin-bottom:10px}
.project-block-title{font-size:12px;font-weight:600;color:#4a6cf7;margin-bottom:8px}
.submit-btn{width:100%;padding:13px;background:#1a1a2e;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity .2s}
.submit-btn:hover{opacity:.88}
.back-btn{width:100%;padding:11px;background:transparent;color:#1a1a2e;border:1.5px solid #ddd;border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;margin-top:8px}
.view{display:none}.view.active{display:block}
.role-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.badge-s{background:#e8f0fe;color:#1a56db}.badge-e{background:#fef3e2;color:#b45309}.badge-b{background:#e6f4ea;color:#166534}
.person-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f0f0f0}
.person-row:last-child{border-bottom:none}
.person-info{display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;border-radius:50%;background:#e8f0fe;color:#1a56db;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.del-btn{background:none;border:none;cursor:pointer;color:#ea4335;font-size:15px;padding:3px 5px}
.summary-box{background:#f8f9ff;border:1.5px solid #e8f0fe;border-radius:10px;padding:12px;margin-top:10px;font-size:11px;font-family:monospace;white-space:pre-wrap;line-height:1.7;max-height:320px;overflow-y:auto}
.copy-btn{width:100%;padding:10px;background:#4a6cf7;color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px}
.tab-row{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.tab{flex:1;min-width:44px;padding:8px 3px;border:1.5px solid #e0e0e0;border-radius:10px;background:#fff;font-size:10px;font-weight:500;cursor:pointer;text-align:center;color:#666;position:relative}
.tab.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.tab .balert{position:absolute;top:-5px;right:-5px;background:#ea4335;color:#fff;border-radius:50%;width:15px;height:15px;font-size:8px;display:flex;align-items:center;justify-content:center;font-weight:700}
.metric-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.metric{background:#f8f9ff;border-radius:10px;padding:10px;text-align:center}
.metric-val{font-size:18px;font-weight:700}
.metric-label{font-size:10px;color:#888;margin-top:2px}
.week-block{background:#f8f9ff;border-radius:10px;padding:10px;margin-bottom:8px}
.week-title{font-size:11px;font-weight:600;color:#4a6cf7;margin-bottom:6px}
.stat-row{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid #eef}
.stat-row:last-child{border-bottom:none}
.stat-label{color:#666}.stat-val{font-weight:600}
.admin-link{font-size:12px;color:#bbb;text-align:center;margin-top:14px;cursor:pointer}
.error-msg{background:#fce8e6;color:#c62828;border-radius:9px;padding:9px 12px;font-size:12px;margin-bottom:10px;display:none}
.pw-wrap{position:relative}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:15px;color:#888;padding:0}
.logout-btn{font-size:11px;background:rgba(255,255,255,.15);border:none;color:#fff;padding:4px 10px;border-radius:8px;cursor:pointer}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:#fff;border-radius:16px;padding:22px;width:100%;max-width:440px;max-height:92vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px}
.close-btn{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:#888;margin-top:-4px}
.report-section{background:#f8f9ff;border-radius:10px;padding:12px;margin-bottom:8px}
.report-section-title{font-size:11px;font-weight:700;color:#1a56db;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.report-kv{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid #e8f0fe}
.report-kv:last-child{border-bottom:none}
.report-kv-label{color:#666}.report-kv-val{font-weight:600}
.member-card{background:#f8f9ff;border:1.5px solid #e8f0fe;border-radius:10px;padding:10px;margin-bottom:8px}
.edit-btn{background:none;border:1.5px solid #4a6cf7;color:#4a6cf7;border-radius:8px;font-size:10px;padding:2px 8px;cursor:pointer}
.tog-sw{width:36px;height:20px;background:#ddd;border-radius:10px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tog-sw.on{background:#34a853}
.tog-knob{width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .2s}
.tog-sw.on .tog-knob{left:18px}
.login-clock{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:14px;padding:20px;text-align:center;margin-bottom:12px;color:#fff}
.clock-time{font-size:34px;font-weight:700;letter-spacing:2px}
.login-mark-btn{background:#34a853;color:#fff;border:none;border-radius:12px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-top:12px}
.login-mark-btn:disabled{background:#666;cursor:not-allowed;opacity:.6}
.leave-card{border:1.5px solid #e0e0e0;border-radius:12px;padding:12px;margin-bottom:10px}
.leave-status{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600}
.ls-pending{background:#fef3e2;color:#b45309}.ls-approved{background:#e6f4ea;color:#166534}.ls-rejected{background:#fce8e6;color:#c62828}.ls-cancelled{background:#f3f4f6;color:#6b7280}
.info-chip{display:inline-block;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:600;background:#e8f0fe;color:#1a56db;margin-left:5px}
.streak-badge{display:inline-flex;align-items:center;gap:3px;background:#fef3e2;color:#b45309;border-radius:20px;padding:2px 7px;font-size:9px;font-weight:600;margin-left:5px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-nav{background:none;border:1.5px solid #e0e0e0;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.cal-nav:disabled{opacity:.3;cursor:default}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day-name{text-align:center;font-size:9px;font-weight:600;color:#888;padding:3px 0}
.cal-cell{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:500;cursor:default;border:1.5px solid transparent}
.cal-cell.clickable{cursor:pointer}.cal-cell.clickable:hover{opacity:.8}
.cal-cell.empty{background:transparent;border-color:transparent}
.c-present{background:#e6f4ea;color:#166534;border-color:#86efac}
.c-login-missed{background:#fef3e2;color:#b45309;border-color:#fcd34d}
.c-eod-missing{background:#fce8e6;color:#c62828;border-color:#fca5a5}
.c-leave{background:#e8f0fe;color:#1a56db;border-color:#93c5fd}
.c-halfday{background:#f3e8fd;color:#7c3aed;border-color:#c4b5fd}
.c-festival{background:#fef9e7;color:#b7770d;border-color:#f7dc6f}
.c-compoff{background:#e8f8f5;color:#0e6655;border-color:#76d7c4}
.c-weekend{background:#f3f4f6;color:#9ca3af}
.c-today{border-color:#4a6cf7!important;box-shadow:0 0 0 2px #4a6cf733}
.c-future{background:#fafafa;color:#ccc}
.legend{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.legend-item{display:flex;align-items:center;gap:3px;font-size:9px;color:#666}
.legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.loading-screen{position:fixed;inset:0;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;z-index:9999}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
/* leave balance cards */
.balance-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.balance-card{border-radius:10px;padding:12px;text-align:center}
.bc-leave{background:#e6f4ea}
.bc-comp{background:#e8f0fe}
.bc-festival{background:#fef9e7}
.balance-val{font-size:22px;font-weight:700}
.balance-label{font-size:10px;color:#666;margin-top:2px}
.comp-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:5px 0;border-bottom:1px solid #f0f0f0}
.comp-row:last-child{border-bottom:none}
.expiry-badge{font-size:9px;padding:1px 6px;border-radius:10px;background:#fce8e6;color:#c62828}
.expiry-ok{background:#e6f4ea;color:#166534}
.txn-row{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid #f5f5f5}
.txn-row:last-child{border-bottom:none}
</style>
</head>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyCdnLPqnvocKHymkFQ5JVxrGkXNf5v2iC4",
  authDomain:"eod-tracker-3414a.firebaseapp.com",
  databaseURL:"https://eod-tracker-3414a-default-rtdb.firebaseio.com",
  projectId:"eod-tracker-3414a",
  storageBucket:"eod-tracker-3414a.firebasestorage.app",
  messagingSenderId:"682826889686",
  appId:"1:682826889686:web:40bb846c146cbbd02fcc77"
});
const db=firebase.database();

// ── STATE ─────────────────────────────────────────────────────
const ADMIN_USER='admin',ADMIN_PASS='Shaw@786#';
const LOGIN_START=9*60,LOGIN_END=9*60+10;
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const NOW=new Date(),TODAY=NOW.toISOString().slice(0,10);

let S={members:[],projects:[],emails:[],submissions:{},logins:{},leaves:[],compoffs:[],leaveTransactions:[]};
let currentUser=null,clockTimer=null;
let userCalState={year:NOW.getFullYear(),month:NOW.getMonth()};
let adminCalState={year:NOW.getFullYear(),month:NOW.getMonth()};
let adminAttPerson='',eodRepPerson='',eodRepTab='daily';

// ── FIREBASE ──────────────────────────────────────────────────
async function loadAll(){
  try{
    const snap=await db.ref('/').once('value');
    const d=snap.val()||{};
    S.members=d.members?Object.values(d.members):[];
    S.projects=d.projects?Object.values(d.projects):[];
    S.emails=d.emails?Object.values(d.emails):[];
    S.submissions=d.submissions||{};
    S.logins=d.logins||{};
    S.leaves=d.leaves?Object.values(d.leaves):[];
    S.compoffs=d.compoffs?Object.values(d.compoffs):[];
    S.leaveTransactions=d.leaveTransactions?Object.values(d.leaveTransactions):[];
    document.getElementById('loading-screen').style.display='none';
  }catch(err){
    document.getElementById('loading-screen').innerHTML=`<div style="text-align:center;padding:20px;max-width:300px">
      <div style="font-size:36px;margin-bottom:10px">&#9888;&#65039;</div>
      <p style="font-size:14px;font-weight:600;margin-bottom:6px">Connection failed</p>
      <p style="font-size:11px;opacity:.7;margin-bottom:14px">${err.message}</p>
      <button onclick="location.reload()" style="background:#34a853;color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer">Try again</button>
    </div>`;
  }
}

function fbSet(p,v){return db.ref(p).set(v);}
async function saveMembers(){const o={};S.members.forEach((m,i)=>o[i]=m);await fbSet('members',o);}
async function saveProjects(){const o={};S.projects.forEach((p,i)=>o[i]=p);await fbSet('projects',o);}
async function saveEmails(){const o={};S.emails.forEach((e,i)=>o[i]=e);await fbSet('emails',o);}
async function saveLeaves(){const o={};S.leaves.forEach((l,i)=>o[i]=l);await fbSet('leaves',o);}
async function saveCompOffs(){const o={};S.compoffs.forEach((c,i)=>o[i]=c);await fbSet('compoffs',o);}
async function saveTransactions(){const o={};S.leaveTransactions.forEach((t,i)=>o[i]=t);await fbSet('leaveTransactions',o);}
async function saveLogin(ds,name,data){await fbSet(`logins/${ds}/${sk(name)}`,data);S.logins[ds]=S.logins[ds]||{};S.logins[ds][name]=data;}
async function saveSubmission(ds,name,data){await fbSet(`submissions/${ds}/${sk(name)}`,data);S.submissions[ds]=S.submissions[ds]||{};S.submissions[ds][name]=data;}

db.ref('leaves').on('value',snap=>{S.leaves=snap.val()?Object.values(snap.val()):[];updateLeaveBadge();const el=document.getElementById('admin-leave-admin');if(el&&el.style.display!=='none')renderAdminLeave();});
db.ref(`submissions/${TODAY}`).on('value',snap=>{S.submissions[TODAY]=snap.val()||{};const el=document.getElementById('admin-today');if(el&&el.style.display!=='none'&&document.getElementById('view-admin').classList.contains('active'))renderToday();});
db.ref(`logins/${TODAY}`).on('value',snap=>{S.logins[TODAY]=snap.val()||{};});

// ── HELPERS ───────────────────────────────────────────────────
function isWeekend(ds){const d=new Date(ds);return d.getDay()===0||d.getDay()===6;}
function isWeekday(ds){return !isWeekend(ds);}
function isFuture(ds){return ds>TODAY;}
function isToday(ds){return ds===TODAY;}
function sk(n){return n.replace(/[\.\s]/g,'_');}
function ini(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function pad2(n){return String(n).padStart(2,'0');}
function roleBadge(r){if(r==='scheduler')return'<span class="role-badge badge-s">Scheduler</span>';if(r==='editor')return'<span class="role-badge badge-e">Editor</span>';return'<span class="role-badge badge-b">Sched+Editor</span>';}
function fmt(ds){return new Date(ds).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function nowMins(){const n=new Date();return n.getHours()*60+n.getMinutes();}
function togglePw(id){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';}
function getSub(ds,name){return S.submissions[ds]?.[sk(name)]||S.submissions[ds]?.[name];}
function getLogin(ds,name){return S.logins[ds]?.[sk(name)]||S.logins[ds]?.[name];}
function getApprovedLeave(name,ds){return S.leaves.find(l=>l.name===name&&l.date===ds&&l.status==='approved');}
function pendingLeaveCount(){return S.leaves.filter(l=>l.status==='pending').length;}
function updateLeaveBadge(){const n=pendingLeaveCount();const b=document.getElementById('leave-badge');if(b){b.style.display=n>0?'flex':'none';b.textContent=n;}}

// ── LEAVE BALANCE LOGIC ───────────────────────────────────────
function getMemberBalance(name){
  const m=S.members.find(x=>x.name===name);
  if(!m) return {leave:0,festival:0,comp:0};
  const openingLeave=parseFloat(m.leaveBalance)||0;
  const festivalSlots=parseInt(m.festivalSlots)||2;

  // count approved leaves (regular)
  let leaveUsed=0;
  S.leaves.filter(l=>l.name===name&&l.status==='approved'&&(l.type==='full'||l.type==='half')).forEach(l=>{
    // check weekend sandwich rule for this leave
    const cost=getLeaveActualCost(name,l);
    leaveUsed+=cost;
  });

  // comp offs available (not used, not expired)
  const today=TODAY;
  const availableComps=S.compoffs.filter(c=>c.name===name&&!c.used&&c.expiryDate>=today);
  const compBalance=availableComps.length;

  // festival leaves used
  const festivalUsed=S.leaves.filter(l=>l.name===name&&l.status==='approved'&&l.type==='festival').length;
  const festivalRemaining=Math.max(0,festivalSlots-festivalUsed);

  // comp offs used first toward leave
  const compUsedForLeave=S.compoffs.filter(c=>c.name===name&&c.used).length;
  const leaveAfterComp=Math.max(0,leaveUsed-compUsedForLeave);
  const remainingLeave=Math.max(0,openingLeave-leaveAfterComp);

  return {leave:remainingLeave,comp:compBalance,festival:festivalRemaining,leaveUsed,compUsedForLeave,openingLeave,festivalUsed,festivalSlots};
}

function getLeaveActualCost(name,leaveRecord){
  if(!leaveRecord) return 0;
  const type=leaveRecord.type;
  if(type==='festival') return 0;
  const ds=leaveRecord.date;
  let cost=type==='half'?0.5:1;

  // Weekend sandwich rule: if leave is on Friday, check if Monday is also leave/absent
  const d=new Date(ds);
  const dayOfWeek=d.getDay();

  // Rule 1: Friday + no Monday = add 2 (Sat+Sun)
  if(dayOfWeek===5){
    const monday=new Date(d);monday.setDate(d.getDate()+3);
    const monDs=monday.toISOString().slice(0,10);
    const monLeave=S.leaves.find(l=>l.name===name&&l.date===monDs&&l.status==='approved');
    const monSub=getSub(monDs,name);
    const monLogin=getLogin(monDs,name);
    if(!monLeave&&!monSub?.submitted&&!monLogin?.time&&monDs<=TODAY){
      cost+=2; // Saturday + Sunday added
    }
  }

  // Rule 2: check if worked less than 3 days that week
  if(dayOfWeek>=1&&dayOfWeek<=5){
    const weekStart=new Date(d);weekStart.setDate(d.getDate()-dayOfWeek+1);
    let workedDays=0;
    for(let i=0;i<5;i++){
      const wd=new Date(weekStart);wd.setDate(weekStart.getDate()+i);
      const wds=wd.toISOString().slice(0,10);
      if(wds>TODAY) continue;
      const wLeave=S.leaves.find(l=>l.name===name&&l.date===wds&&l.status==='approved'&&(l.type==='full'));
      const wSub=getSub(wds,name);
      const wLogin=getLogin(wds,name);
      if(!wLeave&&(wSub?.submitted||wLogin?.time)) workedDays++;
    }
    if(workedDays<3&&cost<3){
      // find if sat/sun of this week already counted
      cost+=2;
    }
  }

  return cost;
}

// ── DAY STATUS ────────────────────────────────────────────────
function dayStatus(name,ds){
  if(isFuture(ds)) return 'future';
  const wknd=isWeekend(ds);
  const sub=getSub(ds,name);
  const login=getLogin(ds,name);
  const leaveRec=getApprovedLeave(name,ds);
  if(leaveRec){
    if(leaveRec.type==='festival') return 'festival';
    if(leaveRec.type==='full') return 'leave';
    if(leaveRec.type==='half') return 'halfday';
    if(leaveRec.type==='compoff') return 'compoff';
  }
  if(wknd){return(sub?.submitted||login?.time)?'present':'weekend';}
  if(isToday(ds)){return sub?.submitted?'present':'today-pending';}
  const member=S.members.find(m=>m.name===name);
  const flexi=member?.flexi;
  const hasLogin=!!login?.time;
  if(!hasLogin&&!sub?.submitted) return flexi?'eod-missing':'login-missed';
  if(hasLogin&&!sub?.submitted) return 'eod-missing';
  return 'present';
}

function getStreak(name){
  let streak=0;const d=new Date(TODAY);
  for(let i=0;i<90;i++){
    if(i>0)d.setDate(d.getDate()-1);
    const ds=d.toISOString().slice(0,10);
    if(isWeekend(ds))continue;
    const st=dayStatus(name,ds);
    if(st==='present'||st==='leave'||st==='halfday'||st==='festival'||st==='compoff')streak++;
    else break;
  }
  return streak;
}

// ── MODAL ─────────────────────────────────────────────────────
function showModal(html){document.getElementById('modal-root').innerHTML=`<div class="modal-overlay" onclick="cmbg(event)"><div class="modal">${html}</div></div>`;}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

// ── VIEW ──────────────────────────────────────────────────────
function showView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  if(v==='login')updateTopBar('none');
  if(v==='admin'){updateTopBar('admin');switchAdminTab('today');}
}
function updateTopBar(mode){
  document.getElementById('top-right-area').innerHTML=
    mode==='admin'?`<button class="logout-btn" onclick="adminLogout()">&#128275; Log out</button>`:
    mode==='user'?`<button class="logout-btn" onclick="userLogout()">&#8592; Log out</button>`:
    `<span style="font-size:11px;opacity:.6">${NOW.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'})}</span>`;
}

function doTeamLogin(){
  const u=document.getElementById('team-username').value.trim();
  const p=document.getElementById('team-password').value;
  const err=document.getElementById('login-error-team');
  const m=S.members.find(x=>x.username===u&&x.password===p);

  const u=document.getElementById('admin-username').value.trim();

  else{err.style.display='block';document.getElementById('admin-password').value='';}
}

// ── USER TABS ─────────────────────────────────────────────────
function switchUserTab(tab){
  ['home','calendar','leave','balance'].forEach(t=>{
    document.getElementById('user-'+t).style.display=t===tab?'':'none';
    document.getElementById('utab-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='home')renderUserHome();
  if(tab==='calendar')renderUserCalendar();
  if(tab==='leave')renderUserLeave();
  if(tab==='balance')renderUserBalance();
}

      ${inW?`<button class="login-mark-btn" onclick="markLogin()">&#128205; Mark my login</button>`:
        before?`<button class="login-mark-btn" disabled>Opens at 09:00</button>`:
        `<button class="login-mark-btn" disabled style="background:#c62828">Login window closed</button>
         <div style="font-size:11px;opacity:.7;margin-top:6px;color:#fca5a5">&#9888; Login missed — apply late login in Leave tab</div>`}
    </div>`;

  } else {

      <div class="clock-time" id="live-clock">${pad2(NOW.getHours())}:${pad2(NOW.getMinutes())}</div>
      <div style="font-size:11px;opacity:.7;margin-top:3px">Flexi login</div>
      <button class="login-mark-btn" onclick="markLogin()">&#128205; Mark my login</button>

  else if(!isWeekend(TODAY))eodSection=`<button class="submit-btn" style="background:#4a6cf7" onclick="startEOD()">&#128221; Fill today's EOD</button>`;
  else eodSection=`<div style="background:#f3f4f6;border-radius:10px;padding:10px;text-align:center"><span style="font-size:12px;color:#6b7280;font-weight:600">&#127774; Weekend — EOD optional</span><br><button class="back-btn" style="margin-top:6px;max-width:180px;margin-left:auto;margin-right:auto" onclick="startEOD()">Fill anyway</button></div>`;

  // leave notifications
  const notifs=S.leaves.filter(l=>l.name===name&&l.status!=='pending'&&!l.seen);
  let notifHtml='';
  if(notifs.length){
    notifHtml='<div class="card">';
    notifs.forEach(l=>{
      const approved=l.status==='approved';
      notifHtml+=`<div style="padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:12px">${approved?'&#9989;':'&#10060;'} <strong>${l.date}</strong> (${l.type}) — <strong style="color:${approved?'#166534':'#c62828'}">${l.status}</strong>${l.adminNote?`<div style="font-size:10px;color:#888;margin-top:1px">Note: ${l.adminNote}</div>`:''}<button onclick="markLeaveSeen('${l.id}')" style="font-size:9px;color:#888;background:none;border:none;cursor:pointer;display:block;margin-top:1px">Dismiss</button></div>`;
    });

    <div class="card">

        <div class="avatar" style="width:38px;height:38px;font-size:13px">${ini(name)}</div>

      </div>

function startClock(){if(clockTimer)return;clockTimer=setInterval(()=>updateClockDisplay(),30000);}
function updateClockDisplay(){const el=document.getElementById('live-clock');if(!el)return;const n=new Date();el.textContent=pad2(n.getHours())+':'+pad2(n.getMinutes());}
async function markLogin(){
  const name=currentUser.name;
  if(getLogin(TODAY,name)?.time)return;
  const n=new Date();
  await saveLogin(TODAY,name,{time:pad2(n.getHours())+':'+pad2(n.getMinutes()),flexi:!!currentUser.flexi});
  clearInterval(clockTimer);clockTimer=null;renderUserHome();
}
async function markLeaveSeen(id){const idx=S.leaves.findIndex(l=>l.id===id);if(idx>-1){S.leaves[idx].seen=true;await saveLeaves();}renderUserHome();}

  else{
    comps.forEach(c=>{
      const daysLeft=Math.ceil((new Date(c.expiryDate)-new Date(today))/(1000*60*60*24));
      const expClass=daysLeft<=7?'expiry-badge':'expiry-badge expiry-ok';
      h+=`<div class="comp-row"><div><div style="font-size:12px;font-weight:600">Comp off — ${c.dateWorked}</div><div style="font-size:10px;color:#888">${c.note||'Weekend worked'}</div></div>
        <span class="${expClass}">Exp: ${c.expiryDate} (${daysLeft}d)</span>
      </div>`;
    });

  h+=`</div>`;

  // transaction history
  const txns=S.leaves.filter(l=>l.name===name&&(l.status==='approved'||l.status==='cancelled')).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,20);
  if(txns.length){
    h+=`<div class="card"><p class="card-title"><span class="icon icon-orange">&#128203;</span>Leave history</p>`;

      const cost=l.type==='festival'?0:l.type==='half'?0.5:1;

      h+=`<div class="txn-row">

      </div>`;
    });
    h+=`</div>`;
  }
  document.getElementById('user-balance').innerHTML=h;
}

// ── USER CALENDAR ─────────────────────────────────────────────
function renderUserCalendar(){
  const name=currentUser.name;
  const yr=userCalState.year,mo=userCalState.month;
  const first=new Date(yr,mo,1),last=new Date(yr,mo+1,0);
  let wd=0,pres=0,issues=0,leave=0;
  for(let d=new Date(first);d<=last&&d<=NOW;d.setDate(d.getDate()+1)){
    const ds=d.toISOString().slice(0,10);if(isWeekend(ds))continue;
    wd++;const st=dayStatus(name,ds);
    if(st==='present')pres++;else if(st==='login-missed'||st==='eod-missing')issues++;
    else if(st==='leave'||st==='halfday'||st==='festival'||st==='compoff')leave++;
  }
  // upcoming approved leaves
  const upcoming=S.leaves.filter(l=>l.name===name&&l.status==='approved'&&l.date>=TODAY).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5);

  let h=`<div class="metric-row"><div class="metric"><div class="metric-val" style="color:#34a853">${pres}</div><div class="metric-label">Days worked</div></div><div class="metric"><div class="metric-val" style="color:#ea4335">${issues}</div><div class="metric-label">Issues</div></div><div class="metric"><div class="metric-val" style="color:#1a56db">${leave}</div><div class="metric-label">Leave/Off</div></div></div>`;

  if(upcoming.length){
    h+=`<div class="card"><p class="card-title" style="font-size:12px"><span class="icon icon-blue">&#128197;</span>Upcoming approved leaves</p>`;
    upcoming.forEach(l=>{
      const typeColors={'full':'#1a56db','half':'#7c3aed','festival':'#b7770d','compoff':'#0e6655'};
      h+=`<div class="person-row">
        <div style="font-size:12px;font-weight:600">${new Date(l.date).toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'})}</div>
        <span style="font-size:11px;font-weight:600;color:${typeColors[l.type]||'#888'}">${l.type}${l.festivalName?' · '+l.festivalName:''}</span>
      </div>`;
    });
    h+=`</div>`;
  }

  h+=buildCal(yr,mo,name,'user');h+=buildLegend();
  document.getElementById('user-calendar').innerHTML=h;
}

async function submitLeaveRequest(){
  const reqType=document.getElementById('leave-request-type').value;
  const reason=document.getElementById('leave-reason').value.trim();
  if(!reason){alert('Please provide a reason.');return;}
  const name=currentUser.name;
  let leaf={id:Date.now().toString(),name,reason,status:'pending',adminNote:'',seen:false,submittedAt:new Date().toISOString()};

  if(reqType==='leave'){
    const date=document.getElementById('leave-date').value;
    const type=document.getElementById('leave-type').value;
    if(!date){alert('Please select a date.');return;}
    const dup=S.leaves.find(l=>l.name===name&&l.date===date&&l.type!=='late-login'&&(l.status==='pending'||l.status==='approved'));
    if(dup){alert('You already have a request for this date.');return;}
    leaf={...leaf,date,type};
  } else if(reqType==='festival'){
    const date=document.getElementById('festival-date').value;
    const festName=document.getElementById('festival-name').value.trim();
    const bal=getMemberBalance(name);
    if(bal.festival<=0){alert('No festival leave slots remaining.');return;}
    if(!date||!festName){alert('Please fill in date and festival name.');return;}
    leaf={...leaf,date,type:'festival',festivalName:festName};
  } else if(reqType==='compoff'){
    const date=document.getElementById('compoff-date').value;
    const bal=getMemberBalance(name);
    if(bal.comp<=0){alert('No comp offs available.');return;}
    if(!date){alert('Please select a date.');return;}
    leaf={...leaf,date,type:'compoff'};
  } else if(reqType==='late-login'){
    const date=document.getElementById('late-login-date').value;
    const loginTime=document.getElementById('late-login-time').value;
    if(!date||!loginTime){alert('Please fill in date and login time.');return;}
    const dup=S.leaves.find(l=>l.name===name&&l.date===date&&l.type==='late-login'&&(l.status==='pending'||l.status==='approved'));
    if(dup){alert('Already have a late login request for this date.');return;}
    leaf={...leaf,date,type:'late-login',loginTime};
  }

  S.leaves.push(leaf);
  await saveLeaves();
  updateLeaveBadge();
  renderUserLeave();
  alert('Request submitted. Awaiting admin approval.');
}

// ── CALENDAR ──────────────────────────────────────────────────
function buildCal(yr,mo,name,mode){
  const firstDow=new Date(yr,mo,1).getDay();
  const dim=new Date(yr,mo+1,0).getDate();
  const isCurMo=(yr===NOW.getFullYear()&&mo===NOW.getMonth());
  let h=`<div class="card"><div class="cal-header">
    <button class="cal-nav" onclick="calNav('${mode}',-1)">&#8249;</button>
    <span style="font-size:13px;font-weight:700">${MONTHS[mo]} ${yr}</span>
    <button class="cal-nav" onclick="calNav('${mode}',1)" ${isCurMo?'disabled':''}>&#8250;</button>
  </div><div class="cal-grid">
    ${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-day-name">${d}</div>`).join('')}`;
  for(let i=0;i<firstDow;i++)h+=`<div class="cal-cell empty"></div>`;
  for(let day=1;day<=dim;day++){
    const ds=`${yr}-${pad2(mo+1)}-${pad2(day)}`;
    const st=dayStatus(name,ds);
    const sub=getSub(ds,name);
    const clickable=(st==='present')&&sub?.submitted;
    const map={'present':'c-present','login-missed':'c-login-missed','eod-missing':'c-eod-missing','leave':'c-leave','halfday':'c-halfday','festival':'c-festival','compoff':'c-compoff','weekend':'c-weekend','future':'c-future','today-pending':'c-future'};
    let cls=`cal-cell ${map[st]||'c-future'}${isToday(ds)?' c-today':''}${clickable?' clickable':''}`;
    const icons={'login-missed':'⚠','eod-missing':'!','leave':'🏖','halfday':'½','festival':'🎉','compoff':'🔄'};
    h+=`<div class="${cls}" ${clickable?`onclick="viewDailyReport('${name}','${ds}')"`:''}>${day}${icons[st]?`<div style="font-size:7px">${icons[st]}</div>`:''}</div>`;
  }
  h+=`</div></div>`;return h;
}

async function decideLeave(id,decision){
  const idx=S.leaves.findIndex(l=>l.id===id);if(idx<0)return;
  const noteEl=document.getElementById('note-'+id);
  S.leaves[idx].status=decision;
  S.leaves[idx].adminNote=noteEl?noteEl.value.trim():'';
  S.leaves[idx].seen=false;
  if(decision==='approved'&&S.leaves[idx].type==='late-login'){
    const l=S.leaves[idx];
    if(!getLogin(l.date,l.name)?.time) await saveLogin(l.date,l.name,{time:l.loginTime,flexi:false,lateApproved:true});
  }
  if(decision==='approved'&&S.leaves[idx].type==='compoff'){
    // mark oldest available comp off as used
    const l=S.leaves[idx];
    const avail=S.compoffs.filter(c=>c.name===l.name&&!c.used&&c.expiryDate>=TODAY).sort((a,b)=>a.expiryDate.localeCompare(b.expiryDate));
    if(avail.length){const ci=S.compoffs.findIndex(c=>c.id===avail[0].id);if(ci>-1){S.compoffs[ci].used=true;S.compoffs[ci].usedDate=l.date;await saveCompOffs();}}
  }
  await saveLeaves();
  updateLeaveBadge();
  renderAdminLeave();
}

async function cancelLeave(id){
  if(!confirm('Cancel this approved leave? Balance will be restored.'))return;
  const idx=S.leaves.findIndex(l=>l.id===id);if(idx<0)return;
  const l=S.leaves[idx];
  // restore comp off if it was used for this
  if(l.type==='compoff'){
    const ci=S.compoffs.findIndex(c=>c.name===l.name&&c.used&&c.usedDate===l.date);
    if(ci>-1){S.compoffs[ci].used=false;delete S.compoffs[ci].usedDate;await saveCompOffs();}
  }
  S.leaves[idx].status='cancelled';
  S.leaves[idx].seen=false;
  S.leaves[idx].adminNote='Cancelled by admin.';
  await saveLeaves();
  renderAdminLeave();
}

  const leaves=S.leaves.filter(l=>l.name===name&&(l.status==='approved'||l.status==='cancelled')).sort((a,b)=>b.date.localeCompare(a.date));

  const rows=[['LEAVE BALANCE REPORT — '+name],['Generated',new Date().toLocaleDateString('en-IN')],[]];
  rows.push(['SUMMARY']);
  rows.push(['Opening Balance',bal.openingLeave+' days']);
  rows.push(['Leave Used',bal.leaveUsed.toFixed(1)+' days']);
  rows.push(['Remaining Balance',bal.leave.toFixed(1)+' days']);
  rows.push(['Comp Offs Available',bal.comp]);
  rows.push(['Festival Slots Remaining',bal.festival+'/'+bal.festivalSlots]);
  rows.push([]);

  rows.push(['LEAVE TRANSACTIONS']);
  rows.push(['Date','Type','Status','Reason','Days Deducted','Admin Note']);
  leaves.forEach(l=>{
    const cost=l.type==='festival'||l.status==='cancelled'?0:l.type==='half'?0.5:1;
    rows.push([l.date,l.type,l.status,l.reason,l.status==='cancelled'?0:cost,l.adminNote||'']);

  rows.push([]);

  comps.forEach(c=>{
    rows.push([c.dateWorked,c.expiryDate,c.used?'Used ('+c.usedDate+')':'Available',c.note||'']);

  downloadCSV(rows,`LeaveBalance_${name.replace(/ /g,'_')}.csv`);
}

function exportMonthlyBalanceCSV(name){
  const rows=[['MONTHLY LEAVE BALANCE — '+name],['Generated',new Date().toLocaleDateString('en-IN')],[]];
  // build month by month for current year
  const year=NOW.getFullYear();
  rows.push(['Month','Leave Used','Comp Offs Used','Festival Leave Used','Running Balance']);
  let runningBal=parseFloat(S.members.find(m=>m.name===name)?.leaveBalance)||0;
  for(let mo=0;mo<12;mo++){
    const first=new Date(year,mo,1).toISOString().slice(0,10);
    const last=new Date(year,mo+1,0).toISOString().slice(0,10);
    const monthLeaves=S.leaves.filter(l=>l.name===name&&l.status==='approved'&&l.date>=first&&l.date<=last);
    const leaveUsed=monthLeaves.filter(l=>l.type==='full').length+monthLeaves.filter(l=>l.type==='half').length*0.5;
    const compUsed=monthLeaves.filter(l=>l.type==='compoff').length;
    const festUsed=monthLeaves.filter(l=>l.type==='festival').length;
    if(mo<=NOW.getMonth()||year<NOW.getFullYear()){
      runningBal=Math.max(0,runningBal-leaveUsed);
      rows.push([MONTHS[mo]+' '+year,leaveUsed.toFixed(1),compUsed,festUsed,runningBal.toFixed(1)]);
    }
  }
  downloadCSV(rows,`MonthlyBalance_${name.replace(/ /g,'_')}_${year}.csv`);
}

async function addCompOff(){
  const name=document.getElementById('comp-person').value;
  const dateWorked=document.getElementById('comp-date-worked').value;
  const expiryDate=document.getElementById('comp-expiry').value;
  const note=document.getElementById('comp-note').value.trim();
  if(!name||!dateWorked||!expiryDate){alert('Please fill all fields.');return;}

  const comp={id:Date.now().toString(),name,dateWorked,expiryDate,note,used:false,addedAt:new Date().toISOString()};

function exportFullAttendanceCSV(name){

  const rows=[['ATTENDANCE REPORT — '+name],['Generated',new Date().toLocaleDateString('en-IN')],['Role',member?.role||''],[]];

  // Balance summary
  rows.push(['LEAVE BALANCE SUMMARY']);
  rows.push(['Opening Balance',bal.openingLeave+' days']);
  rows.push(['Leave Used',bal.leaveUsed.toFixed(1)+' days']);
  rows.push(['Remaining Balance',bal.leave.toFixed(1)+' days']);
  rows.push(['Comp Offs Available',bal.comp]);
  rows.push(['Festival Slots Remaining',bal.festival+'/'+bal.festivalSlots]);
  rows.push([]);

  // Month selector — export selected month from adminCalState
  const yr=adminCalState.year,mo=adminCalState.month;
  const first=new Date(yr,mo,1),last=new Date(yr,mo+1,0);
  rows.push(['ATTENDANCE — '+MONTHS[mo]+' '+yr]);
  rows.push(['Date','Day','Login Time','EOD Time','Status','Leave Type','Note']);

  let workedDays=0,loginMissed=0,eodMissing=0,leaveCount=0,halfCount=0,totalDays=0;
  for(let d=new Date(first);d<=last;d.setDate(d.getDate()+1)){
    const ds=d.toISOString().slice(0,10);
    if(ds>TODAY) continue;
    const login=getLogin(ds,name);
    const sub=getSub(ds,name);
    const leaveRec=getApprovedLeave(name,ds);
    const wknd=isWeekend(ds);
    const st=dayStatus(name,ds);
    const stLabels={'present':'Worked','login-missed':'Login Missed','eod-missing':'EOD Not Filled','leave':'On Leave','halfday':'Half Day','festival':'Festival Leave','compoff':'Comp Off','weekend':'Weekend','today-pending':'Pending','future':''};
    const dayName=new Date(ds).toLocaleDateString('en-IN',{weekday:'long'});
    if(!wknd){totalDays++;}
    if(st==='present') workedDays++;
    else if(st==='login-missed') loginMissed++;
    else if(st==='eod-missing') eodMissing++;
    else if(st==='leave'||st==='festival'||st==='compoff') leaveCount++;
    else if(st==='halfday') halfCount++;
    rows.push([ds,dayName,login?.time||'',sub?.time||'',stLabels[st]||st,leaveRec?leaveRec.type:'',leaveRec?.reason||'']);

  rows.push([]);
  rows.push(['MONTHLY SUMMARY']);
  rows.push(['Total working days',totalDays]);
  rows.push(['Days worked',workedDays]);
  rows.push(['Login missed',loginMissed]);
  rows.push(['EOD not filled',eodMissing]);
  rows.push(['On leave',leaveCount]);
  rows.push(['Half days',halfCount]);

  downloadCSV(rows,`Attendance_${name.replace(/ /g,'_')}_${MONTHS[mo]}_${yr}.csv`);
}

        });

        rows.push([ds,sub.role,login?.time||'',sub.time||'','','' ,'','','','','',sub.editor.assigned,sub.editor.cleared,sub.editor.queries,sub.editor.backlog,sub.editor.dailyReport]);
      }

    d.setDate(d.getDate()+1);

function downloadCSV(rows,filename){
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
}

}

function sr(l,v){return `<div class="stat-row"><span class="stat-label">${l}</span><span class="stat-val">${v}</span></div>`;}
function kv(label,val){const c=val==='Yes'?'#166534':val==='No'?'#c62828':'#1a1a2e';return `<div class="report-kv"><span class="report-kv-label">${label}</span><span class="report-kv-val" style="color:${c}">${val}</span></div>`;}

function aggregate(name,role,period){
  const now=new Date();const result={submissionDays:0,workingDays:0};
  let startDate;
  if(period==='week'){startDate=new Date(now);startDate.setDate(now.getDate()-6);}
  else{startDate=new Date(now.getFullYear(),now.getMonth(),1);}
  if(role==='scheduler'||role==='both')result.scheduler={coordinated:0,recoordinated:0,briefings:0,dailyReport:0,completeSent:0};
  if(role==='editor'||role==='both')result.editor={assigned:0,cleared:0,queries:0,backlog:0,dailyReport:0};
  const d=new Date(startDate);
  while(d<=now){
    const ds=d.toISOString().slice(0,10);
    if(isWeekday(ds)){
      result.workingDays++;
      const sub=getSub(ds,name);
      if(sub?.submitted){
        result.submissionDays++;
        if(sub.scheduler&&result.scheduler){Object.values(sub.scheduler).forEach(p=>{
          result.scheduler.coordinated+=p.coordinated||0;result.scheduler.recoordinated+=p.recoordinated||0;
          result.scheduler.briefings+=p.briefings||0;
          if(p.dailyReport==='Yes')result.scheduler.dailyReport++;
          if(p.completeSent==='Yes')result.scheduler.completeSent++;
        });}
        if(sub.editor&&result.editor){
          result.editor.assigned+=sub.editor.assigned||0;result.editor.cleared+=sub.editor.cleared||0;
          result.editor.queries+=sub.editor.queries||0;result.editor.backlog+=sub.editor.backlog||0;
          if(sub.editor.dailyReport==='Yes')result.editor.dailyReport++;
        }
      }
    }
    d.setDate(d.getDate()+1);
  }
  return result;
}

function ynComplete(cId,iId){
  return `<label>Complete daily status sent?</label>
  <div class="yn-group" id="grp-${cId}">
    <button class="yn-btn yes complete-yn" data-ci="${cId}" data-ii="${iId}">&#10003; Yes</button>
    <button class="yn-btn no active complete-yn" data-ci="${cId}" data-ii="${iId}">&#10007; No</button>
  </div>
  <label>Incomplete daily status sent?</label>
  <div class="yn-group" id="grp-${iId}">
    <button class="yn-btn yes active incomplete-yn" data-id="${iId}">&#10003; Yes</button>
    <button class="yn-btn no incomplete-yn" data-id="${iId}">&#10007; No</button>
  </div>`;
}
function wireComplete(pi){
  const cId='s_complete_'+pi,iId='s_incomplete_'+pi;
  const cBtns=document.querySelectorAll(`.complete-yn[data-ci="${cId}"]`);
  const iBtns=document.querySelectorAll(`.incomplete-yn[data-id="${iId}"]`);
  if(!cBtns.length||!iBtns.length) return;
  function apply(y){
    if(y){
      iBtns.forEach(b=>{b.classList.add('locked');b.classList.remove('active');});
      if(iBtns[1]) iBtns[1].classList.add('active');
    } else {
      iBtns.forEach(b=>{b.classList.remove('locked','active');});
      if(iBtns[0]) iBtns[0].classList.add('active');
    }
  }
  apply(false);
  cBtns.forEach(btn=>{btn.onclick=function(){cBtns.forEach(b=>b.classList.remove('active'));this.classList.add('active');apply(this.classList.contains('yes'));};});
  iBtns.forEach(btn=>{btn.onclick=function(){if(this.classList.contains('locked'))return;iBtns.forEach(b=>b.classList.remove('active'));this.classList.add('active');};});
}
function nf(id,label){return `<label>${label} <span style="color:#ea4335">*</span></label><input type="number" id="${id}" min="0" placeholder="Enter number" onfocus="if(this.value==='0')this.value=''" onblur="if(this.value==='')this.value='0'">`;}
function yn(id,label){return `<label>${label}</label><div class="yn-group"><button class="yn-btn yes" data-id="${id}">&#10003; Yes</button><button class="yn-btn no active" data-id="${id}">&#10007; No</button></div>`;}
function getYN(id){const el=document.querySelector(`.yn-btn[data-id="${id}"].active`);return el?(el.classList.contains('yes')?'Yes':'No'):'No';}
function getYNg(gId){const el=document.querySelector(`#grp-${gId} .yn-btn.active`);return el?(el.classList.contains('yes')?'Yes':'No'):'No';}
function getNum(id){return parseInt(document.getElementById(id)?.value)||0;}

function validateEOD(){
  const u=currentUser;const projects=S.projects.length?S.projects:['General'];const errors=[];
  if(u.role==='scheduler'||u.role==='both'){
    projects.forEach((proj,pi)=>{
      const f=id=>document.getElementById(id)?.value?.trim();
      if(!f('s_coord_'+pi))errors.push(`[${proj}] Audits coordinated required.`);
      if(!f('s_recoord_'+pi))errors.push(`[${proj}] Audits re-coordinated required.`);
      if(!f('s_brief_'+pi))errors.push(`[${proj}] Briefings done required.`);
    });
  }
  if(u.role==='editor'||u.role==='both'){
    const f=id=>document.getElementById(id)?.value?.trim();
    if(!f('e_assigned'))errors.push('Audits assigned required.');
    if(!f('e_cleared'))errors.push('Audits cleared required.');
    if(!f('e_queries'))errors.push('Audits in queries required.');
    if(!f('e_backlog'))errors.push('Backlog required.');
  }
  if(u.role==='director'){
    const notes=document.getElementById('d_notes')?.value?.trim();
    if(!notes) errors.push('Notes / Summary is required.');
  }
  if(u.role==='bd'){
    const notes=document.getElementById('bd_notes')?.value?.trim();
    if(!notes) errors.push('Notes / Summary is required.');
  }
  return errors;
}

async function submitEOD(){
  if(getSub(TODAY,currentUser.name)?.submitted){alert('Already submitted today!');return;}
  const errors=validateEOD();
  const errEl=document.getElementById('eod-err');
  if(errors.length){errEl.style.display='block';errEl.innerHTML='<strong>&#9888; Please fill all required fields:</strong><br>'+errors.map(e=>`• ${e}`).join('<br>');errEl.scrollIntoView({behavior:'smooth',block:'center'});return;}
  errEl.style.display='none';
  const u=currentUser;const projects=S.projects.length?S.projects:['General'];
  const data={submitted:true,role:u.role,date:TODAY,time:new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})};
  if(u.role==='scheduler'||u.role==='both'){
    data.scheduler={};
    projects.forEach((proj,pi)=>{data.scheduler[proj]={coordinated:getNum('s_coord_'+pi),recoordinated:getNum('s_recoord_'+pi),briefings:getNum('s_brief_'+pi),dailyReport:getYN('s_rep_'+pi),completeSent:getYNg('s_complete_'+pi),incompleteSent:getYNg('s_incomplete_'+pi)};});
  }
  if(u.role==='editor'||u.role==='both'){data.editor={assigned:getNum('e_assigned'),cleared:getNum('e_cleared'),queries:getNum('e_queries'),backlog:getNum('e_backlog'),dailyReport:getYN('e_report')};}
  if(u.role==='director'){
    data.director={
      notes:document.getElementById('d_notes')?.value?.trim()||''
    };
  }
  if(u.role==='bd'){
    data.bd={
      notes:document.getElementById('bd_notes')?.value?.trim()||''
    };
  }
  await saveSubmission(TODAY,u.name,data);
  showView('success');
}

async function saveMember(editIdx){
  const name=document.getElementById('m-name').value.trim();
  const role=document.getElementById('m-role').value;
  const username=document.getElementById('m-username').value.trim();
  const password=document.getElementById('m-password').value;
  const flexi=document.getElementById('flexi-tog').classList.contains('on');
  const autoFlexi=(role==='director'||role==='bd')?true:flexi;
  const leaveBalance=parseFloat(document.getElementById('m-leave').value)||0;
  const festivalSlots=parseInt(document.getElementById('m-festival').value)||2;
  if(!name||!username||!password){alert('Name, username and password are required.');return;}
  if(editIdx===undefined||editIdx==='undefined'){
    if(S.members.find(m=>m.name===name)){alert('Name exists');return;}
    if(S.members.find(m=>m.username===username)){alert('Username taken');return;}
    S.members.push({name,role,username,password,flexi:autoFlexi,leaveBalance,festivalSlots});
  } else {
    const idx=parseInt(editIdx);
    if(S.members.find((m,i)=>m.username===username&&i!==idx)){alert('Username taken');return;}
    S.members[idx]={name,role,username,password,flexi:autoFlexi,leaveBalance,festivalSlots};
  }
  await saveMembers();closeModal();renderSettings();
}
async function removeMember(i){if(!confirm('Remove this member?'))return;S.members.splice(i,1);await saveMembers();renderSettings();}

async function removeProject(i){S.projects.splice(i,1);await saveProjects();renderSettings();}
async function addEmail(){const e=document.getElementById('new-email').value.trim();if(!e)return;S.emails.push(e);document.getElementById('new-email').value='';await saveEmails();renderSettings();}
async function removeEmail(i){S.emails.splice(i,1);await saveEmails();renderSettings();}

// ── EMAIL ─────────────────────────────────────────────────────
async function generateEmail(){
  const dateVal=document.getElementById('email-date').value||TODAY;
  const subsSnap=await db.ref(`submissions/${dateVal}`).once('value');
  const subs=subsSnap.val()||{};
  const logSnap=await db.ref(`logins/${dateVal}`).once('value');
  const logins=logSnap.val()||{};
  const dateStr=new Date(dateVal).toDateString();
  let body=`TO: ${S.emails.join(', ')||'[add recipients in settings]'}\nSUBJECT: Team EOD Summary — ${dateStr}\n\nGood morning,\n\nEOD summary for ${dateStr}:\n\n`;
  let hasAny=false;
  S.members.forEach(m=>{
    const k=sk(m.name);const sub=subs[k]||subs[m.name];const login=logins[k]||logins[m.name];
    const leaveRec=getApprovedLeave(m.name,dateVal);
    if(leaveRec&&leaveRec.type==='full'){body+=`${m.name.toUpperCase()} — On approved leave\n\n`;return;}
    if(!sub?.submitted)return;hasAny=true;
    body+=`━━━━━━━━━━━━━━━━━━━━━━\n${m.name.toUpperCase()} (${m.role})\nLogin: ${login?.time||'Not recorded'} | EOD: ${sub.time||'—'}\n━━━━━━━━━━━━━━━━━━━━━━\n`;
    if(sub.scheduler){Object.entries(sub.scheduler).forEach(([proj,d2])=>{
      body+=`Project: ${proj}\n  Coordinated: ${d2.coordinated} | Re-coord: ${d2.recoordinated} | Briefings: ${d2.briefings}\n  Daily report: ${d2.dailyReport} | Complete: ${d2.completeSent} | Incomplete: ${d2.incompleteSent}\n`;
    });}
    if(sub.editor)body+=`Assigned: ${sub.editor.assigned} | Cleared: ${sub.editor.cleared} | Queries: ${sub.editor.queries} | Backlog: ${sub.editor.backlog} | Report: ${sub.editor.dailyReport}\n`;
    body+=`\n`;
  });
  if(!hasAny)body+=`No submissions received for ${dateStr}.\n\n`;
  const pending=S.members.filter(m=>{const k=sk(m.name);return!(subs[k]||subs[m.name])?.submitted&&!getApprovedLeave(m.name,dateVal);}).map(m=>m.name);
  if(pending.length)body+=`Not submitted: ${pending.join(', ')}\n\n`;
  body+=`Regards,\nShaw Hotels EOD Tracker`;
  const enc=encodeURIComponent(body);
  document.getElementById('email-output').innerHTML=`<div class="summary-box">${body.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>
    <button class="copy-btn" onclick="copyEmail(this,'${enc}')">&#128203; Copy to clipboard</button>`;
}
function copyEmail(btn,enc){navigator.clipboard.writeText(decodeURIComponent(enc)).then(()=>{btn.textContent='&#10003; Copied!';setTimeout(()=>btn.textContent='&#128203; Copy to clipboard',2000);});}

updateTopBar('none');
